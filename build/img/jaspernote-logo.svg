<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="jaspernote logo">
  <defs>
    <!-- 背景渐变，偏 Docusaurus 风 -->
    <linearGradient id="badge" x1="32" y1="24" x2="224" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4F46E5"/>
      <stop offset="0.5" stop-color="#EC4899"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>

    <!-- 玻璃高光 -->
    <linearGradient id="shine" x1="64" y1="40" x2="192" y2="168" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="rgba(255,255,255,0.9)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>

    <!-- 轻投影，保证小尺寸也清晰 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- 圆角矩形徽章 -->
  <rect x="32" y="32" width="192" height="192" rx="56" fill="url(#badge)" filter="url(#shadow)"/>
  <rect x="32.75" y="32.75" width="190.5" height="190.5" rx="55.25" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>

  <!-- 斜切高光 -->
  <path
    d="M68 68c19-18 46-30 76-30h32c14 0 26 12 26 26v22c0 10-3 20-9 28-32-18-76-14-122 10-14 8-26 10-37 8 1-32 11-53 34-64Z"
    fill="url(#shine)"
    opacity="0.45"
  />

  <!-- 记事本主体 -->
  <path
    d="M88 82c0-8.8 7.2-16 16-16h64c8.8 0 16 7.2 16 16v84c0 13.3-10.7 24-24 24H104c-13.3 0-24-10.7-24-24V82Z"
    fill="rgba(15,23,42,0.96)"
  />

  <!-- 页面折角 -->
  <path
    d="M152 66h16c8.8 0 16 7.2 16 16v18h-18c-7.7 0-14-6.3-14-14V66Z"
    fill="#F9FAFB"
    opacity="0.86"
  />

  <!-- 竖向彩条（书脊，J 的竖画） -->
  <rect x="104" y="90" width="14" height="80" rx="7" fill="#38BDF8"/>

  <!-- “J” 的下勾 -->
  <path
    d="M118 162c0 14 8.5 22 22.5 22 10.4 0 17.5-3.8 21.8-11 2.2-3.7 6.9-5 10.7-2.8 3.7 2.2 5 6.9 2.8 10.7-6.2 10.3-17.6 16.9-35.3 16.9-23 0-38.5-14.7-38.5-36.7a8 8 0 0 1 16 0Z"
    fill="#38BDF8"
  />

  <!-- 水平分界线，暗示笔记行 -->
  <path d="M124 116h52" stroke="rgba(248,250,252,0.65)" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M124 132h40" stroke="rgba(148,163,184,0.95)" stroke-width="3" stroke-linecap="round"/>
  <path d="M124 148h32" stroke="rgba(148,163,184,0.85)" stroke-width="3" stroke-linecap="round"/>

  <!-- 轻微内阴影顶部，增加立体感 -->
  <path
    d="M88 86c0-8.8 7.2-16 16-16h64c8.8 0 16 7.2 16 16v6H88v-6Z"
    fill="rgba(15,23,42,0.72)"
  />
</svg>
